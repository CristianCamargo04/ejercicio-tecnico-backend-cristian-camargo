spring.application.name=ms-cuentas
server.port=8082

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/cuentas_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Custom RabbitMQ properties
rabbitmq.exchange.clientes=clientes.exchange
rabbitmq.queue.clientes=cuentas.clientes.queue
rabbitmq.routing-key.pattern=cliente.*
