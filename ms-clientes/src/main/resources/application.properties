spring.application.name=ms-clientes
server.port=8081

# DataSource
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/clientes_db
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# RabbitMQ
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:guest}

# Custom RabbitMQ properties
rabbitmq.exchange.clientes=clientes.exchange
rabbitmq.routing-key.cliente-creado=cliente.creado
rabbitmq.routing-key.cliente-actualizado=cliente.actualizado
rabbitmq.routing-key.cliente-eliminado=cliente.eliminado
